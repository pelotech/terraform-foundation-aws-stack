name: pre-commit
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          # Do not leave the token in .git/config; untrusted PR hooks run in
          # later steps. Write-back uses the GitHub API with GH_TOKEN instead.
          persist-credentials: false
      - name: install pre-commit
        run: pip install pre-commit

      - name: Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.9.0"

      - name: install hcledit
        run: |
          tmpdir=$(mktemp -d)
          curl -sSLo "$tmpdir/hcledit.tar.gz" https://github.com/minamijoyo/hcledit/releases/download/v0.2.10/hcledit_0.2.10_linux_amd64.tar.gz
          tar -xzf "$tmpdir/hcledit.tar.gz" -C "$tmpdir"
          chmod +x "$tmpdir/hcledit"
          sudo mv "$tmpdir/hcledit" /usr/local/bin/hcledit

      - name: install tf-lint
        run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: install tf-docs
        run: |
          tmpdir=$(mktemp -d)
          curl -sSLo "$tmpdir/terraform-docs.tar.gz" https://terraform-docs.io/dl/v0.22.0/terraform-docs-v0.22.0-linux-amd64.tar.gz
          tar -xzf "$tmpdir/terraform-docs.tar.gz" -C "$tmpdir"
          chmod +x "$tmpdir/terraform-docs"
          sudo mv "$tmpdir/terraform-docs" /usr/local/bin/terraform-docs

      - name: install trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
        with:
          version: v0.72.0

      - name: Regenerate docs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: pre-commit run terraform_docs --all-files || true

      - name: Check for docs changes
        id: docs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet -- ':(glob)**/README.md'; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Runs on every event and is the required status check. On the docs commit
      # (run #2) this re-runs and lands a green check on the head SHA. Untrusted
      # hooks run here, BEFORE any write-capable token exists.
      - name: pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Generate app token
        id: app-token
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.docs.outputs.changed == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.ORG_RELEASE_PLEASE_CLIENT_ID }}
          private-key: ${{ secrets.ORG_RELEASE_PLEASE_PRIVATE_KEY }}

      - name: Commit docs changes back to PR branch (signed)
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.docs.outputs.changed == 'true'
        uses: planetscale/ghcommit-action@a6b150b81dca5dd027baa898604418eec9e11465 # v0.2.22
        with:
          commit_message: "docs: regenerate docs"
          repo: ${{ github.repository }}
          branch: ${{ github.head_ref }}
          file_pattern: ':(glob)**/README.md'
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
